<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting…</title>
  <script>
    (function () {
      try {
        var hash = window.location.hash || '';
        if (hash === '#workwithus') {
          // exact anchor -> careers
          window.location.replace('/careers');
        } else {
          // otherwise go to canonical About Us (absolute)
          window.location.replace('https://www.openenergytransition.org/about-us');
        }
      } catch (e) {
        // fallback
        window.location.replace('https://www.openenergytransition.org/about-us');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://www.openenergytransition.org/about-us" />
  </noscript>
</head>
<body>
  Redirecting...
</body>
</html>
